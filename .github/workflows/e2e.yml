name: e2e (emulator)

# Non-gating: runs the Firebase-emulator Playwright suite on every push and
# reports status. It does NOT gate the deploy workflow (deploy.yml is separate
# and unaffected). Flip to gating only after the suite proves stable.

on:
  push:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Firestore emulator needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: npm ci

      - name: Install firebase CLI
        run: npm install -g firebase-tools

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Diagnostic ladder (step conclusions are API-readable even when logs are
      # not): A) can the emulators start at all?  B) does the seed run against
      # them?  C) the full suite. Whichever fails pinpoints the layer.
      - name: A — emulators start (surface error to annotations)
        run: |
          set +e
          npx firebase-tools --debug emulators:exec --project demo-pbscoutpro --only auth,firestore "echo EMULATORS_OK" > boot.log 2>&1
          code=$?
          echo "exit=$code"
          tail -40 boot.log
          if [ $code -ne 0 ]; then
            ( grep -iE "error|java|download|port|not (found|installed)|cannot|fail" boot.log | tail -8
              echo "----debug tail----"
              [ -f firebase-debug.log ] && tail -10 firebase-debug.log ) | while IFS= read -r l; do echo "::error::$l"; done
            exit $code
          fi
        env:
          GCLOUD_PROJECT: demo-pbscoutpro

      - name: B — seed runs against emulators
        run: npx firebase-tools emulators:exec --project demo-pbscoutpro --only auth,firestore "node scripts/test/seed-emulator.cjs"
        env:
          GCLOUD_PROJECT: demo-pbscoutpro

      # playwright.emulator.config.js webServer boots emulators:exec → seed →
      # vite (VITE_USE_EMULATOR), so no Firebase secrets are needed (demo project).
      - name: Run e2e suite (emulator)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: tests/report-e2e
          retention-days: 14
