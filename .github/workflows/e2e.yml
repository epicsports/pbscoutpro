name: e2e (emulator)

# Non-gating: runs the Firebase-emulator Playwright suite on every push and
# reports status. It does NOT gate the deploy workflow (deploy.yml is separate
# and unaffected). Flip to gating only after the suite proves stable.

on:
  push:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Firestore emulator needs a JRE; current firebase-tools requires JDK 21+.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci

      - name: Install firebase CLI
        run: npm install -g firebase-tools

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Quick sanity: emulators start + seed runs (fast-fail before the suite).
      - name: Emulator boot check
        run: npx firebase-tools emulators:exec --project demo-pbscoutpro --only auth,firestore "node scripts/test/seed-emulator.cjs"
        env:
          GCLOUD_PROJECT: demo-pbscoutpro

      # The suite's webServer boots emulators:exec → seed → vite (VITE_USE_EMULATOR).
      - name: Run e2e suite (emulator)
        run: npm run test:e2e
        env:
          GCLOUD_PROJECT: demo-pbscoutpro

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: tests/report-e2e
          retention-days: 14
