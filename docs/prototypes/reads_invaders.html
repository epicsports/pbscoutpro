<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Reads — Invaders</title>
<style>
  /* tokens copied verbatim from src/utils/theme.js so the port is 1:1 */
  :root{
    --bg:#0a0e17; --surface:#111827; --surfaceBar:#0d1117; --border:#2a3548;
    --accent:#f59e0b; --accentDim:#b47708; --text:#e2e8f0; --textDim:#94a3b8;
    --textMuted:#64748b; --black:#000;
    --seg-dim:#f59e0b1f;   /* ~12% — ghost segment */
    --ghost:#f59e0b14;     /* GhostGrid stroke */
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{margin:0;height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;
    position:fixed;inset:0;width:100%;touch-action:none}
  body{background:var(--bg);color:var(--text);font-family:var(--font);
    display:flex;align-items:center;justify-content:center}
  #app{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;align-items:center;
    padding-bottom:env(safe-area-inset-bottom)}

  .topbar{width:100%;max-width:480px;display:flex;align-items:center;gap:8px;
    padding:calc(8px + env(safe-area-inset-top)) 12px 8px}
  .iconbtn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--accent);background:none;border:none}
  .iconbtn.off{color:var(--textMuted)}
  .brand{flex:1;display:flex;align-items:center;gap:8px}
  .brand b{font-size:13px;font-weight:800;letter-spacing:1px;color:var(--textDim)}

  .hud{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px 8px;box-sizing:border-box}
  .hud .lives{display:flex;gap:5px}
  .hud .lives i{width:11px;height:11px;border-radius:50%;background:var(--accent);display:block}
  .hud .lives i.dead{background:#f59e0b26}
  .hud .hi{font-size:10px;font-weight:800;color:var(--textMuted);letter-spacing:1px;text-align:right;margin-top:4px}

  .stage{position:relative;width:100%;max-width:480px;padding:0 12px;box-sizing:border-box}
  canvas{display:block;width:100%;background:var(--surfaceBar);border-radius:12px;
    border:1px solid var(--border);max-height:56vh;touch-action:manipulation}

  .overlay{position:absolute;inset:0 12px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;background:#0a0e17e8;border-radius:12px;padding:16px;box-sizing:border-box}
  .title{font-size:20px;font-weight:900;letter-spacing:1px;margin-top:8px}
  .tagline{font-size:13px;color:var(--textDim);margin-top:4px}
  .hint{font-size:10px;color:var(--textMuted);margin-top:12px;letter-spacing:1px}
  .row{display:flex;gap:12px;margin-top:16px}

  .startbtn{min-width:120px;min-height:56px;padding:12px 20px;background:var(--surface);
    color:var(--text);border:1px solid #f59e0b55;border-radius:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px}
  .startbtn:active{background:#1f2b3d}
  .startbtn .l{font-size:16px;font-weight:900;color:var(--accent);letter-spacing:1px}
  .startbtn .s{font-size:11px;color:var(--textMuted)}
  .linkbtn{margin-top:16px;min-height:44px;padding:0 16px;background:none;border:none;cursor:pointer;
    font-size:12px;font-weight:800;letter-spacing:2px;color:var(--textDim)}

  .scores{width:100%;max-width:280px}
  .scores h3{text-align:center;font-size:17px;font-weight:900;letter-spacing:2px;color:var(--accent);margin:0 0 12px}
  .scores .none{text-align:center;font-size:13px;color:var(--textMuted)}
  .scores .r{display:flex;align-items:center;font-size:15px;font-weight:700;padding:3px 0}
  .scores .r .n{width:28px;color:var(--textMuted)}
  .scores .r .i{flex:1;letter-spacing:2px}
  .scores .r .v{font-variant-numeric:tabular-nums}
  .scores .r.lead{color:var(--accent)}

  /* GAME OVER initials picker */
  .ini{margin-top:12px}
  .ini .new{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:1px}
  .ini .picks{display:flex;gap:12px;justify-content:center;margin-top:8px}
  .ini .col{display:flex;flex-direction:column;align-items:center;gap:2px}
  .ini .col .ch{font-size:30px;font-weight:900;color:var(--accent);width:26px;text-align:center}
  .inibtn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
    background:var(--surface);color:var(--accent);border:1px solid var(--border);border-radius:10px;cursor:pointer}
  .savebtn{margin-top:12px;padding:12px 28px;min-height:44px;background:var(--accent);color:var(--black);
    border:none;border-radius:12px;font-weight:900;font-size:15px;letter-spacing:1px;cursor:pointer}
  .savebtn:disabled{opacity:.5}

  .dpad{width:100%;max-width:480px;display:flex;gap:12px;padding:12px 16px;box-sizing:border-box}
  .dbtn{flex:1;min-height:72px;display:flex;align-items:center;justify-content:center;
    background:var(--surface);color:var(--accent);border:1px solid var(--border);border-radius:12px;
    cursor:pointer;touch-action:none;user-select:none}
  .dbtn:active{background:#1f2b3d}
  .steerhint{width:100%;max-width:480px;text-align:center;font-size:10px;letter-spacing:1px;
    color:var(--textMuted);padding:0 16px 2px}

  @media (prefers-reduced-motion: reduce){ .scan{display:none} }
</style>

<div id="app">
  <div class="topbar">
    <button class="iconbtn" id="close" aria-label="Close"><!--X-->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="brand">
      <b>READS&nbsp;INVADERS</b>
    </div>
    <button class="iconbtn" id="music" aria-label="Music"><!--Music note-->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </button>
    <button class="iconbtn" id="sfx" aria-label="Sound"><!--Volume2-->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>
    </button>
  </div>

  <div class="hud">
    <div id="seg"></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="lives" id="lives"><i></i><i></i><i></i></div>
      <div class="hi" id="hi">HI&nbsp;0000 · A</div>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div id="overlay" class="overlay"></div>
  </div>

  <div class="steerhint" id="steerhint" style="display:none">DRAG THE FIELD TO STEER · AUTO-FIRE</div>
  <div class="dpad" id="dpad" style="display:none">
    <button class="dbtn" id="left" aria-label="Left"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    <button class="dbtn" id="right" aria-label="Right"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
  </div>
</div>

<script>
(() => {
  "use strict";
  const C = {
    bg:'#0a0e17', surfaceBar:'#0d1117', accent:'#f59e0b', accentDim:'#b47708',
    ghost:'rgba(245,158,11,0.08)', text:'#e2e8f0',
  };
  const CAP = 9999;
  const W = 240, H = 220;                 // logical play-field
  const COLS = 6, ROWS = 4;
  const PX = 2;                           // sprite "pixel" size
  const POINTS = [30, 20, 20, 10];        // by row, top worth more
  const PLAYER_Y = H - 18;
  const AUTOFIRE_MS = 360;     // research: mobile invaders auto-fire (no fire button to thumb)
  const STEER_GAIN = 1.35;     // relative drag sensitivity (finger slides, ship tracks direction)

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // -- paintball-creature sprites (amber pixels). '#' lit; '=' cut (LCD shows
  //    through - goggle lenses / eyes); '-' empty. Two frames = marching wiggle.
  const MASK = [[ // paintball mask / goggles
    "--#######--","-#########-","##-------##","#=========#",
    "#=========#","-#-#-#-#-#-","#-#-----#-#",
  ],[
    "--#######--","-#########-","##-------##","#=========#",
    "#=========#","-#-#-#-#-#-","-#-#---#-#-",
  ]];
  const HOPPER = [[ // loader / hopper
    "---#####---","--#######--","-#-#####-#-","#=========#",
    "#=#######=#","-#########-","#-#-----#-#",
  ],[
    "---#####---","--#######--","-#-#####-#-","#=========#",
    "#=#######=#","-#########-","-#-#---#-#-",
  ]];
  const BLOB = [[ // paint-splat critter
    "--#-----#--","---#---#---","--#######--","-##=###=##-",
    "-#########-","--##-#-##--","-#-#---#-#-",
  ],[
    "--#-----#--","#--#---#--#","#-#######-#","###=###=###",
    "###########","--##-#-##--","--#-#-#-#--",
  ]];
  const PLAYER = [
    "-----#-----","----###----","---#####---","--#######--",
    "-#########-","###########","##-#####-##","#---------#",
  ];
  const MARKER = [ // bonus flyer (paintball marker)
    "--#####-----","-#######--#-","############","-#-#-#-#-#--",
  ];
  const ROW_SPRITE = [MASK, HOPPER, HOPPER, BLOB]; // per grid row

  function spriteW(s){ return (s[0] ? s[0].length : 0) * PX; }
  function spriteH(s){ return s.length * PX; }
  function drawSprite(ctx, s, x, y, color){
    ctx.fillStyle = color;
    for (let r=0; r<s.length; r++){
      const row = s[r];
      for (let c=0; c<row.length; c++){
        if (row[c] === '#') ctx.fillRect(x + c*PX, y + r*PX, PX, PX);
      }
    }
  }

  // -- audio (procedural, iOS-safe: unlocked on first gesture) ---------------
  function makeAudio(){
    let ac=null; const ensure=()=>{ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch{ ac=null; } } if(ac&&ac.state==='suspended') ac.resume(); return ac; };
    const beep=(freq,dur,type='square',gain=0.05)=>{ const a=ensure(); if(!a) return; const o=a.createOscillator(),g=a.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=gain; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur); o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur); };
    const noise=(dur,gain=0.08)=>{ const a=ensure(); if(!a) return; const n=a.sampleRate*dur, buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0); for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n); const src=a.createBufferSource(),g=a.createGain(); src.buffer=buf; g.gain.value=gain; src.connect(g).connect(a.destination); src.start(); };
    return { ensure, beep, noise };
  }
  const AUDIO = makeAudio();
  let sfxOn = true, musicOn = true;
  const sfx = { shoot:()=>sfxOn&&AUDIO.beep(880,0.05,'square',0.04),
                hit:()=>sfxOn&&AUDIO.beep(520,0.07,'square',0.05),
                boom:()=>sfxOn&&AUDIO.noise(0.18,0.07),
                ufo:()=>sfxOn&&AUDIO.beep(1200,0.10,'sawtooth',0.05),
                step:(lo)=>sfxOn&&AUDIO.beep(lo?70:96,0.06,'square',0.05) };

  // -- 1-bit arcade music: ONE square-wave channel, arpeggiated loop (Am-F-G-E).
  //    True 1-bit feel (monophonic on/off), procedural, no assets. Music toggle.
  function makeMusic(){
    const PAT=[ // 16 steps; low root then chord tones, 4 steps per chord
      110,220,262,330,   // Am
       87,220,262,349,   // F
       98,247,294,392,   // G
       82,208,247,330 ]; // E
    const STEP=150; let timer=null, i=0;
    const tick=()=>{ const a=AUDIO.ensure(); if(!a) return; const f=PAT[i++%PAT.length]; if(!f) return;
      const o=a.createOscillator(), g=a.createGain(); o.type='square'; o.frequency.value=f;
      g.gain.value=0.03; g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+STEP/1000*0.9);
      o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+STEP/1000); };
    return { start(){ if(timer) return; i=0; AUDIO.ensure(); tick(); timer=setInterval(tick,STEP); },
             stop(){ if(timer){ clearInterval(timer); timer=null; } } };
  }
  const MUSIC = makeMusic();

  // -- DOM refs --------------------------------------------------------------
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const overlay=document.getElementById('overlay'), dpad=document.getElementById('dpad'), steerhint=document.getElementById('steerhint');
  const segEl=document.getElementById('seg'), livesEl=document.getElementById('lives'), hiEl=document.getElementById('hi');

  function sizeCanvas(){ const dpr=Math.min(devicePixelRatio||1,3); cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
  sizeCanvas(); addEventListener('resize', sizeCanvas);

  // -- 7-seg HUD (geometry verbatim from ReadsMiniPage SevenSeg) -------------
  const SEG={a:[4,0,12,4],b:[16,4,4,12],c:[16,20,4,12],d:[4,32,12,4],e:[0,20,4,12],f:[0,4,4,12],g:[4,16,12,4]};
  const SEG7={0:'abcdef',1:'bc',2:'abged',3:'abgcd',4:'fgbc',5:'afgcd',6:'afgcde',7:'abc',8:'abcdefg',9:'abcdfg'};
  function digitSVG(n){ const on=SEG7[n]||''; let r=`<svg width="20" height="36" viewBox="0 0 20 36" style="display:block">`;
    for(const k in SEG){ const [x,y,w,h]=SEG[k]; r+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="1.4" fill="${on.includes(k)?C.accent:'#f59e0b1f'}"/>`; }
    return r+`</svg>`; }
  function seven(value){ const str=String(Math.max(0,value|0)).padStart(4,'0').slice(-4);
    segEl.innerHTML=`<div style="display:flex;gap:4px;align-items:center">${[...str].map(d=>digitSVG(+d)).join('')}</div>`; }

  // -- game state ------------------------------------------------------------
  let G=null, board=[], best=0, mode='A';
  const input={left:false,right:false};
  let raf=0, last=0, attractAcc=0, attractTab='title', stepLo=false;

  function spawnWave(wave){
    const inv=[]; const ox=20, oy=18, gx=33, gy=20;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      inv.push({cx:ox+c*gx, cy:oy+r*gy, row:r, col:c, alive:true});
    return inv;
  }
  function fresh(m){
    return { phase:'playing', mode:m, score:0, lives:3, wave:1,
      inv:spawnWave(1), dir:1, stepAcc:0, frame:0,
      px:W/2, bullets:[], bombs:[], splats:[], fireCd:0, fireTimer:0, bombCd:700,
      marker:null, markerCd:6000, flash:0, invuln:0 };
  }

  // -- lifecycle -------------------------------------------------------------
  function start(m){ AUDIO.ensure(); mode=m; G=fresh(m); dpad.style.display='flex'; steerhint.style.display='block'; overlay.style.display='none'; if(musicOn) MUSIC.start(); renderHUD(); }
  function toAttract(){ if(G) G.phase='attract'; dpad.style.display='none'; steerhint.style.display='none'; MUSIC.stop(); attractTab='title'; attractAcc=0; renderHUD(); drawAttract(); }
  function gameOver(){ if(!G||G.phase==='over') return; G.phase='over'; dpad.style.display='none'; steerhint.style.display='none'; MUSIC.stop(); sfx.boom();
    const final=Math.min(CAP,G.score); G.final=final; G.isPB=final>best && final>0; G.initials='AAA'; G.submitted=false;
    if(final>best) best=final; renderHUD(); drawOver(); }

  // -- input -----------------------------------------------------------------
  function fire(){ if(!G||G.phase!=='playing') return; if(G.bullets.length>=2) return;
    G.bullets.push({x:G.px,y:PLAYER_Y-10}); sfx.shoot(); }
  const press=(el,on,off)=>{ el.addEventListener('pointerdown',e=>{e.preventDefault();AUDIO.ensure();on();}); ['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,off||(()=>{}))); };
  press(document.getElementById('left'), ()=>input.left=true, ()=>input.left=false);
  press(document.getElementById('right'),()=>input.right=true,()=>input.right=false);

  // Relative drag-steer (research-backed primary control): slide a finger on the
  // field and the ship tracks the drag DIRECTION - the finger never covers the
  // ship, and firing is automatic, so no fiddly two-thumb button management.
  let dragId=null, dragX=0;
  cv.addEventListener('pointerdown',e=>{ AUDIO.ensure(); if(!G||G.phase!=='playing') return;
    dragId=e.pointerId; dragX=e.clientX; try{cv.setPointerCapture(e.pointerId);}catch{} e.preventDefault(); });
  cv.addEventListener('pointermove',e=>{ if(dragId!==e.pointerId||!G||G.phase!=='playing') return;
    const ratio=W/(cv.clientWidth||W);
    G.px=Math.max(14,Math.min(W-14, G.px+(e.clientX-dragX)*ratio*STEER_GAIN));
    dragX=e.clientX; e.preventDefault(); });
  const endDrag=e=>{ if(dragId===e.pointerId) dragId=null; };
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>cv.addEventListener(ev,endDrag));

  addEventListener('keydown',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA') input.left=true;
    else if(e.code==='ArrowRight'||e.code==='KeyD') input.right=true;
    else if(e.code==='Space'){ e.preventDefault(); fire(); } });
  addEventListener('keyup',e=>{ if(e.code==='ArrowLeft'||e.code==='KeyA') input.left=false; else if(e.code==='ArrowRight'||e.code==='KeyD') input.right=false; });
  document.getElementById('close').onclick=()=>toAttract();
  document.getElementById('music').onclick=function(){ musicOn=!musicOn; this.classList.toggle('off',!musicOn);
    if(musicOn && G && G.phase==='playing') MUSIC.start(); else MUSIC.stop(); };
  document.getElementById('sfx').onclick=function(){ sfxOn=!sfxOn; this.classList.toggle('off',!sfxOn); };

  // -- simulation ------------------------------------------------------------
  function aliveBounds(){ let l=1e9,r=-1e9,b=-1e9; for(const v of G.inv) if(v.alive){ l=Math.min(l,v.cx); r=Math.max(r,v.cx); b=Math.max(b,v.cy); } return {l,r,b}; }
  function spriteForRow(row){ return ROW_SPRITE[row][G.frame]; }

  function update(dt){
    if(!G||G.phase!=='playing') return;
    G.fireCd=Math.max(0,G.fireCd-dt); G.bombCd=Math.max(0,G.bombCd-dt);
    G.markerCd=Math.max(0,G.markerCd-dt); G.flash=Math.max(0,G.flash-dt); G.invuln=Math.max(0,G.invuln-dt);

    // auto-fire
    G.fireTimer-=dt;
    if(G.fireTimer<=0 && G.bullets.length<2){ G.bullets.push({x:G.px,y:PLAYER_Y-10}); G.fireTimer=AUTOFIRE_MS; sfx.shoot(); }

    // player (buttons / keyboard; drag steers directly via pointermove)
    const spd=0.14*dt;
    if(input.left) G.px-=spd; if(input.right) G.px+=spd;
    G.px=Math.max(14,Math.min(W-14,G.px));

    // bullets
    for(const b of G.bullets) b.y-=0.34*dt;
    G.bullets=G.bullets.filter(b=>b.y>-6);

    // invader march (stepped cadence -> LCD feel; also animates frame)
    const total=COLS*ROWS, alive=G.inv.filter(v=>v.alive).length;
    if(alive===0){ G.wave++; G.inv=spawnWave(G.wave); G.dir=1; G.stepAcc=0; sfx.hit(); return; }
    const frac=alive/total;
    const fast=G.mode==='B';
    const stepMs=Math.max(80,(fast?95:130)+(fast?360:470)*frac-(G.wave-1)*42);
    G.stepAcc+=dt;
    if(G.stepAcc>=stepMs){
      G.stepAcc-=stepMs; G.frame^=1; stepLo=!stepLo; sfx.step(stepLo);
      const {l,r}=aliveBounds(); const dx=8*G.dir;
      const halfW=spriteW(MASK[0])/2;
      if(r+dx>W-halfW-2 || l+dx<halfW+2){ G.dir*=-1; for(const v of G.inv) if(v.alive) v.cy+=12; }
      else for(const v of G.inv) if(v.alive) v.cx+=dx;
      // bomb drop
      const bombFreq=fast?420:650;
      if(G.bombCd<=0 && Math.random()<(fast?0.7:0.5)){
        const front=G.inv.filter(v=>v.alive);
        const s=front[(Math.random()*front.length)|0];
        if(s){ G.bombs.push({x:s.cx,y:s.cy+8}); G.bombCd=bombFreq; }
      }
      if(aliveBounds().b>=PLAYER_Y-16){ gameOver(); return; }
    }

    // bonus marker
    if(!G.marker && G.markerCd<=0){ G.marker={x:-14,dir:1,pts:[50,100,150][(Math.random()*3)|0]}; G.markerCd=9000; sfx.ufo(); }
    if(G.marker){ G.marker.x+=0.06*dt; if(G.marker.x>W+14) G.marker=null; }

    // bombs
    for(const bo of G.bombs) bo.y+=0.17*dt;
    G.bombs=G.bombs.filter(bo=>{
      if(bo.y>H+6) return false;
      if(G.invuln<=0 && Math.abs(bo.x-G.px)<11 && bo.y>PLAYER_Y-8){
        G.lives--; G.invuln=900; G.splats.push({x:G.px,y:PLAYER_Y,t:0}); sfx.boom();
        renderHUD(); if(G.lives<=0) gameOver(); return false;
      }
      return true;
    });

    // bullet collisions
    for(const b of G.bullets){
      if(G.marker && Math.abs(b.x-(G.marker.x))<12 && b.y<24){ G.score=Math.min(CAP,G.score+G.marker.pts);
        G.splats.push({x:G.marker.x,y:14,t:0}); G.marker=null; b.y=-99; sfx.ufo(); renderHUD(); continue; }
      for(const v of G.inv){ if(!v.alive) continue;
        const hw=spriteW(MASK[0])/2, hh=spriteH(MASK[0])/2;
        if(Math.abs(b.x-v.cx)<hw && Math.abs(b.y-v.cy)<hh+2){
          v.alive=false; b.y=-99; G.score=Math.min(CAP,G.score+POINTS[v.row]);
          G.splats.push({x:v.cx,y:v.cy,t:0}); if(G.score%100<POINTS[v.row]) G.flash=120;
          sfx.hit(); renderHUD(); break;
        }
      }
    }
    G.bullets=G.bullets.filter(b=>b.y>-6);

    for(const s of G.splats) s.t+=dt;
    G.splats=G.splats.filter(s=>s.t<300);
  }

  // -- render ----------------------------------------------------------------
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=C.surfaceBar; ctx.fillRect(0,0,W,H);

    // ghost grid (faint home cells) - GhostGrid analogue
    if(G){ ctx.fillStyle=C.ghost; for(const v of G.inv){ ctx.beginPath(); ctx.arc(v.cx,v.cy,8,0,7); ctx.fill(); } }

    if(G && G.phase!=='attract'){
      // invaders
      for(const v of G.inv){ if(!v.alive) continue;
        const s=spriteForRow(v.row); drawSprite(ctx,s,v.cx-spriteW(s)/2,v.cy-spriteH(s)/2,C.accent); }
      // bonus marker
      if(G.marker) drawSprite(ctx,MARKER,G.marker.x-spriteW(MARKER)/2,8,C.accent);
      // bombs (paint drips)
      ctx.fillStyle=C.accentDim; for(const bo of G.bombs) ctx.fillRect(bo.x-1.5,bo.y-4,3,8);
      // bullets (paintballs)
      ctx.fillStyle=C.accent; for(const b of G.bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,2.4,0,7); ctx.fill(); }
      // player marker (blink while invuln)
      if(!(G.invuln>0 && ((G.invuln/120|0)%2))) drawSprite(ctx,PLAYER,G.px-spriteW(PLAYER)/2,PLAYER_Y-spriteH(PLAYER),C.accent);
      // splats (paint ring)
      for(const s of G.splats){ const a=1-s.t/300; ctx.strokeStyle=`rgba(245,158,11,${a})`; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(s.x,s.y,3+s.t/16,0,7); ctx.stroke(); }
      if(G.flash>0){ ctx.fillStyle=`rgba(245,158,11,${0.10*G.flash/120})`; ctx.fillRect(0,0,W,H); }
    }

    // scanlines
    if(!reduced){ ctx.fillStyle='rgba(0,0,0,0.10)'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1); }
  }

  // -- HUD + overlays (text identical to ReadsMiniPage) ----------------------
  function renderHUD(){
    const sv = G ? (G.phase==='playing'?G.score:(G.phase==='over'?G.final:best)) : best;
    seven(sv);
    const miss = G?(3-G.lives):0;
    [...livesEl.children].forEach((el,i)=>el.classList.toggle('dead', i>=3-(G?G.lives:3)));
    const hi=Math.max(best, board[0]?board[0].score:0);
    hiEl.innerHTML=`HI&nbsp;${String(hi).padStart(4,'0')} · ${G?G.mode:mode}`;
  }
  function scoresHTML(){
    const rows=board.slice(0,8);
    let h=`<div class="scores"><h3>HIGH SCORES</h3>`;
    if(!rows.length) h+=`<div class="none">Be the first.</div>`;
    rows.forEach((r,i)=>{ h+=`<div class="r ${i===0?'lead':''}"><span class="n">${i+1}.</span><span class="i">${r.initials||'???'}</span><span class="v">${String(r.score||0).padStart(4,'0')}</span></div>`; });
    return h+`</div>`;
  }
  function drawAttract(){
    overlay.style.display='flex';
    const hi=Math.max(best, board[0]?board[0].score:0);
    if(attractTab==='scores'){
      overlay.innerHTML=scoresHTML()+`<button class="linkbtn" id="back">‹ BACK</button>`;
      document.getElementById('back').onclick=()=>{ attractTab='title'; drawAttract(); };
      return;
    }
    overlay.innerHTML=`
      <div class="title">Invaders</div>
      <div class="tagline">Make the read.</div>
      <div class="row">
        <button class="startbtn" data-m="A"><span class="l">Game A</span><span class="s">classic</span></button>
        <button class="startbtn" data-m="B"><span class="l">Game B</span><span class="s">fast</span></button>
      </div>
      <div class="hint">DRAG TO STEER · AUTO-FIRE · HI ${String(hi).padStart(4,'0')}</div>
      <button class="linkbtn" id="hs">HIGH SCORES ›</button>`;
    overlay.querySelectorAll('.startbtn').forEach(b=>b.onclick=()=>start(b.dataset.m));
    document.getElementById('hs').onclick=()=>{ attractTab='scores'; drawAttract(); };
  }
  function drawOver(){
    overlay.style.display='flex';
    if(G.isPB){
      overlay.innerHTML=`
        <div class="title">GAME OVER</div>
        <div style="margin-top:8px" id="ovseg"></div>
        <div class="ini"><div class="new">NEW BEST — ENTER INITIALS</div>
          <div class="picks">${[0,1,2].map(i=>`
            <div class="col">
              <button class="inibtn" data-up="${i}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m18 15-6-6-6 6"/></svg></button>
              <span class="ch" id="ch${i}">${G.initials[i]}</span>
              <button class="inibtn" data-dn="${i}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg></button>
            </div>`).join('')}</div>
          <button class="savebtn" id="save">SAVE</button>
        </div>`;
      const ov=document.getElementById('ovseg'); ov.innerHTML=`<div style="display:flex;gap:4px">${[...String(G.final).padStart(4,'0')].map(d=>digitSVG(+d)).join('')}</div>`;
      const bump=(i,d)=>{ const code=((G.initials.charCodeAt(i)-65+d+26)%26)+65; G.initials=G.initials.slice(0,i)+String.fromCharCode(code)+G.initials.slice(i+1); document.getElementById('ch'+i).textContent=G.initials[i]; };
      overlay.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>bump(+b.dataset.up,1));
      overlay.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>bump(+b.dataset.dn,-1));
      document.getElementById('save').onclick=function(){ if(G.submitted) return; G.submitted=true; this.disabled=true;
        board.push({initials:G.initials,score:G.final}); board.sort((a,b)=>b.score-a.score); board=board.slice(0,25);
        renderHUD(); toAttract(); };
    } else {
      overlay.innerHTML=`
        <div class="title">GAME OVER</div>
        <div style="margin-top:8px" id="ovseg"></div>
        <div class="row">
          <button class="startbtn" id="retry"><span class="l">Retry</span><span class="s">▶</span></button>
          <button class="startbtn" id="menu"><span class="l">Menu</span><span class="s">↩</span></button>
        </div>`;
      document.getElementById('ovseg').innerHTML=`<div style="display:flex;gap:4px">${[...String(G.final).padStart(4,'0')].map(d=>digitSVG(+d)).join('')}</div>`;
      document.getElementById('retry').onclick=()=>start(G.mode);
      document.getElementById('menu').onclick=()=>toAttract();
    }
  }

  // -- loop ------------------------------------------------------------------
  function frame(now){
    const dt=Math.min(48, now-(last||now)); last=now;
    if(G && G.phase==='playing') update(dt);
    draw();
    raf=requestAnimationFrame(frame);
  }

  // boot
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  G=fresh('A'); G.phase='attract'; toAttract(); seven(0);
  raf=requestAnimationFrame(frame);
})();
</script>
