<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img">
<title>PbScoutPro data flow — three writer groups, two storage destinations, batch propagator with two triggers</title>
<desc>Coach writes go directly to point homeData and awayData. Player Tier 1 writes go to shot subcollection. Player Tier 2 PPT writes go to selfReports collection. Batch propagator reads selfReports and writes back to point with meta provenance. Two triggers fire it: matchup status closing and late-log auto-trigger.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="40" y="30" width="180" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="130" y="54" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Coach + scout</text>
<text class="ts" x="130" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Canvas, quick log, assignments</text>

<rect x="250" y="30" width="180" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="54" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player Tier 1</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">HotSheet + KIOSK in-match</text>

<rect x="460" y="30" width="180" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="550" y="54" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player Tier 2</text>
<text class="ts" x="550" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">PPT wizard cold review</text>

<line x1="130" y1="94" x2="190" y2="180" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="94" x2="280" y2="180" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="94" x2="550" y2="180" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="180" width="380" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="230" y="204" text-anchor="middle" dominant-baseline="central" fill="#3C3489">point.homeData / awayData (canonical inline)</text>
<text class="ts" x="230" y="228" text-anchor="middle" dominant-baseline="central" fill="#3C3489">assignments · slotIds · players · shots · eliminations</text>
<text class="ts" x="230" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">+ playersMeta · shotsMeta · eliminationsMeta (NEW)</text>

<rect x="450" y="180" width="190" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="545" y="204" text-anchor="middle" dominant-baseline="central" fill="#085041">selfReports</text>
<text class="ts" x="545" y="228" text-anchor="middle" dominant-baseline="central" fill="#085041">Player-owned collection</text>
<text class="ts" x="545" y="248" text-anchor="middle" dominant-baseline="central" fill="#085041">slotRef → pointId, slotId</text>

<line x1="545" y1="270" x2="545" y2="350" class="arr" marker-end="url(#arrow)"/>

<rect x="180" y="350" width="320" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="340" y="374" text-anchor="middle" dominant-baseline="central" fill="#633806">Batch propagator (NEW)</text>
<text class="ts" x="340" y="396" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Client-side, runs on coach device</text>
<text class="ts" x="340" y="416" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Match orphan selfReport → slotId, batched write</text>

<line x1="500" y1="380" x2="560" y2="380" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="560" y1="380" x2="560" y2="270" stroke="#5F5E5A" stroke-width="0.5"/>

<path d="M 270 350 Q 230 320 230 270" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="170" y="320" fill="#854F0B" text-anchor="end">write-back</text>
<text class="ts" x="170" y="336" fill="#854F0B" text-anchor="end">to homeData</text>

<text class="th" x="340" y="475" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Two triggers fire the propagator</text>

<rect x="40" y="490" width="290" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="185" y="510" text-anchor="middle" dominant-baseline="central" fill="#633806">matchup.status: playing → closed</text>
<text class="ts" x="185" y="532" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Coach action, batch all orphans</text>

<rect x="350" y="490" width="290" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="495" y="510" text-anchor="middle" dominant-baseline="central" fill="#633806">Late-log auto-trigger</text>
<text class="ts" x="495" y="532" text-anchor="middle" dominant-baseline="central" fill="#854F0B">PPT save to closed matchup, single-shot</text>

<line x1="185" y1="490" x2="240" y2="442" class="arr" marker-end="url(#arrow)"/>
<line x1="495" y1="490" x2="440" y2="442" class="arr" marker-end="url(#arrow)"/>
</svg>
