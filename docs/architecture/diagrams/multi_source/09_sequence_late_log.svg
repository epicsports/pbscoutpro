<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 720" role="img">
<title>Sequence diagram — late-log auto-trigger when player saves PPT after matchup already closed</title>
<desc>Player saves PPT but matchup is already closed. WizardShell detects closed status and fires single-shot propagation directly. Propagator finds matching point, locates slot via assignments, writes back in one updateDoc.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .lifeline { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .activation { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .msg { stroke: #2C2C2A; stroke-width: 1; fill: none; }
  .return { stroke: #888780; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="thinarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1" stroke-linecap="round"/>
  </marker>
</defs>

<rect x="20" y="20" width="130" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="85" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player</text>
<text class="ts" x="85" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">PPT save action</text>

<rect x="180" y="20" width="160" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="260" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">WizardShell</text>
<text class="ts" x="260" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">handleSave handler</text>

<rect x="370" y="20" width="160" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="450" y="40" text-anchor="middle" dominant-baseline="central" fill="#712B13">Firestore</text>
<text class="ts" x="450" y="58" text-anchor="middle" dominant-baseline="central" fill="#712B13">selfReports + points</text>

<rect x="560" y="20" width="100" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="610" y="40" text-anchor="middle" dominant-baseline="central" fill="#633806">Propagator</text>
<text class="ts" x="610" y="58" text-anchor="middle" dominant-baseline="central" fill="#854F0B">single-shot path</text>

<line x1="85" y1="70" x2="85" y2="700" class="lifeline"/>
<line x1="260" y1="70" x2="260" y2="700" class="lifeline"/>
<line x1="450" y1="70" x2="450" y2="700" class="lifeline"/>
<line x1="610" y1="70" x2="610" y2="700" class="lifeline"/>

<rect x="40" y="95" width="600" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Pre-condition: matchup.status === 'closed' (coach already ended matchup)</text>

<text class="ts" x="40" y="155" fill="#5F5E5A">T+10min</text>
<rect x="80" y="160" width="10" height="40" class="activation"/>
<line x1="90" y1="172" x2="260" y2="172" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="175" y="165" text-anchor="middle" fill="#2C2C2A">submit PPT form</text>

<rect x="255" y="180" width="10" height="320" class="activation"/>

<line x1="265" y1="200" x2="450" y2="200" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="357" y="193" text-anchor="middle" fill="#2C2C2A">createSelfReport(slotRef:null)</text>
<line x1="450" y1="225" x2="265" y2="225" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="357" y="218" text-anchor="middle" fill="#5F5E5A">selfReportId</text>

<line x1="265" y1="255" x2="450" y2="255" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="357" y="248" text-anchor="middle" fill="#2C2C2A">getMatchup(matchupId)</text>
<line x1="450" y1="280" x2="265" y2="280" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="357" y="273" text-anchor="middle" fill="#5F5E5A">matchup{status:'closed'}</text>

<rect x="155" y="295" width="210" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="260" y="308" text-anchor="middle" dominant-baseline="central" fill="#633806">detect: matchup closed</text>
<text class="ts" x="260" y="324" text-anchor="middle" dominant-baseline="central" fill="#854F0B">→ trigger late-log path</text>

<line x1="265" y1="365" x2="610" y2="365" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="437" y="358" text-anchor="middle" fill="#2C2C2A">propagateSingleSelfReport(reportId)</text>

<rect x="605" y="380" width="10" height="240" class="activation"/>

<line x1="610" y1="405" x2="450" y2="405" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="398" text-anchor="middle" fill="#2C2C2A">queryPoint(matchupId, playerId)</text>
<line x1="450" y1="430" x2="610" y2="430" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="530" y="423" text-anchor="middle" fill="#5F5E5A">point with assignments</text>

<rect x="500" y="445" width="220" height="40" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="610" y="458" text-anchor="middle" dominant-baseline="central" fill="#633806">find slot:</text>
<text class="ts" x="610" y="474" text-anchor="middle" dominant-baseline="central" fill="#854F0B">assignments.indexOf(playerId)</text>

<line x1="610" y1="510" x2="450" y2="510" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="503" text-anchor="middle" fill="#2C2C2A">updateDoc per slot</text>
<text class="ts" x="530" y="525" text-anchor="middle" fill="#854F0B">{players[i], shots[i], elims, _meta}</text>
<line x1="450" y1="555" x2="610" y2="555" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="530" y="548" text-anchor="middle" fill="#5F5E5A">ack</text>

<line x1="610" y1="595" x2="265" y2="595" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="437" y="588" text-anchor="middle" fill="#5F5E5A">propagation complete</text>

<line x1="265" y1="630" x2="90" y2="630" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="175" y="623" text-anchor="middle" fill="#2C2C2A">toast: "log synchronized"</text>

<line x1="40" y1="660" x2="660" y2="660" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="340" y="680" text-anchor="middle" fill="#5F5E5A">~10 lines extra code in WizardShell.handleSave</text>
<text class="ts" x="340" y="696" text-anchor="middle" fill="#5F5E5A">Reuses propagator's matcher logic — no duplication</text>
</svg>
