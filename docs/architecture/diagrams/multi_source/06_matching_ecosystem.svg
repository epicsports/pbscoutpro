<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 640" role="img">
<title>Three-layer matching ecosystem in PbScoutPro</title>
<desc>M1 matches players to teams via teamId and teamHistory. M2 matches users to players via five mechanisms. M3 matches observations to points via slotRef, the new layer added by section 57.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="40" y="32" dominant-baseline="central" fill="#2C2C2A">Layer M1 — Player ↔ Team</text>
<text class="ts" x="40" y="50" dominant-baseline="central" fill="#5F5E5A">Existing · roster membership with audit history</text>

<rect x="40" y="65" width="240" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="160" y="85" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">players/{pid}</text>
<text class="ts" x="160" y="105" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">teamId · teamHistory[]</text>
<text class="ts" x="160" y="121" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">{from, to: null} entries</text>

<line x1="280" y1="100" x2="400" y2="100" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="92" text-anchor="middle" fill="#5F5E5A">teamId →</text>

<rect x="400" y="65" width="240" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="520" y="85" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">teams/{tid}</text>
<text class="ts" x="520" y="105" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">parentTeamId for hierarchy</text>
<text class="ts" x="520" y="121" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Ranger → Ring/Rage/Rebel/Rush</text>

<line x1="40" y1="160" x2="640" y2="160" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="th" x="40" y="185" dominant-baseline="central" fill="#2C2C2A">Layer M2 — User ↔ Player</text>
<text class="ts" x="40" y="203" dominant-baseline="central" fill="#5F5E5A">Existing · five complementary mechanisms</text>

<rect x="40" y="220" width="200" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="140" y="240" text-anchor="middle" dominant-baseline="central" fill="#0C447C">users/{uid}</text>
<text class="ts" x="140" y="258" text-anchor="middle" dominant-baseline="central" fill="#0C447C">email, displayName, roles[]</text>

<rect x="440" y="220" width="200" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="540" y="240" text-anchor="middle" dominant-baseline="central" fill="#0C447C">players/{pid}</text>
<text class="ts" x="540" y="258" text-anchor="middle" dominant-baseline="central" fill="#0C447C">linkedUid, emails[], pbliId</text>

<line x1="240" y1="245" x2="440" y2="245" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="290" width="200" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="140" y="310" text-anchor="middle" dominant-baseline="central" fill="#0C447C">linkedUid (primary)</text>
<text class="ts" x="140" y="326" text-anchor="middle" dominant-baseline="central" fill="#185FA5">self-claim, admin link</text>

<rect x="260" y="290" width="160" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="340" y="310" text-anchor="middle" dominant-baseline="central" fill="#0C447C">pbliId</text>
<text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central" fill="#185FA5">PBLeagues onboarding</text>

<rect x="440" y="290" width="200" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="540" y="310" text-anchor="middle" dominant-baseline="central" fill="#0C447C">emails[]</text>
<text class="ts" x="540" y="326" text-anchor="middle" dominant-baseline="central" fill="#185FA5">self-log identity (HotSheet, PPT)</text>

<rect x="40" y="350" width="280" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="180" y="370" text-anchor="middle" dominant-baseline="central" fill="#0C447C">workspaces[] + defaultWorkspace</text>
<text class="ts" x="180" y="386" text-anchor="middle" dominant-baseline="central" fill="#185FA5">membership + auto-enter target</text>

<rect x="340" y="350" width="300" height="48" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="490" y="370" text-anchor="middle" dominant-baseline="central" fill="#0C447C">pendingApprovals + userRoles[uid]</text>
<text class="ts" x="490" y="386" text-anchor="middle" dominant-baseline="central" fill="#185FA5">admin governance, role assignment</text>

<line x1="40" y1="420" x2="640" y2="420" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<text class="th" x="40" y="445" dominant-baseline="central" fill="#2C2C2A">Layer M3 — Observation ↔ Point</text>
<text class="ts" x="40" y="463" dominant-baseline="central" fill="#854F0B">NEW for § 57 · was the gap, no matching mechanism existed</text>

<rect x="40" y="480" width="240" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="160" y="500" text-anchor="middle" dominant-baseline="central" fill="#633806">selfReports/{sid}</text>
<text class="ts" x="160" y="520" text-anchor="middle" dominant-baseline="central" fill="#854F0B">slotRef: {pointId, slotId}</text>
<text class="ts" x="160" y="536" text-anchor="middle" dominant-baseline="central" fill="#854F0B">propagatedAt timestamp</text>

<line x1="280" y1="515" x2="400" y2="515" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="507" text-anchor="middle" fill="#854F0B">slotRef →</text>

<rect x="400" y="480" width="240" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="520" y="500" text-anchor="middle" dominant-baseline="central" fill="#633806">points/{pid}</text>
<text class="ts" x="520" y="520" text-anchor="middle" dominant-baseline="central" fill="#854F0B">slotIds: [uuid, ...]</text>
<text class="ts" x="520" y="536" text-anchor="middle" dominant-baseline="central" fill="#854F0B">resolved by batch propagator</text>

<rect x="40" y="570" width="600" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="590" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Matcher reads M1 + M2 to validate playerId in point.assignments before binding slotRef</text>
<text class="ts" x="340" y="608" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">No "first free slot" guesswork · explicit playerId presence required</text>
</svg>
