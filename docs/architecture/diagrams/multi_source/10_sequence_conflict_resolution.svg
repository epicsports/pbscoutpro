<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 760" role="img">
<title>Sequence diagram — per-field conflict resolution between scout and self-log writes</title>
<desc>Scout taps player position on canvas. Player logs differently via PPT. Propagator runs at end-of-matchup and resolves each field independently using per-field rules: scout wins position, self-log wins death stage, coach wins death reason.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .lifeline { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .activation { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .msg { stroke: #2C2C2A; stroke-width: 1; fill: none; }
  .return { stroke: #888780; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="thinarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1" stroke-linecap="round"/>
  </marker>
</defs>

<rect x="20" y="20" width="130" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="85" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Scout (Coach)</text>
<text class="ts" x="85" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">canvas tap</text>

<rect x="180" y="20" width="130" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="245" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player</text>
<text class="ts" x="245" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">PPT wizard</text>

<rect x="340" y="20" width="170" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="425" y="40" text-anchor="middle" dominant-baseline="central" fill="#712B13">Firestore</text>
<text class="ts" x="425" y="58" text-anchor="middle" dominant-baseline="central" fill="#712B13">point + selfReport</text>

<rect x="540" y="20" width="120" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="600" y="40" text-anchor="middle" dominant-baseline="central" fill="#633806">Propagator</text>
<text class="ts" x="600" y="58" text-anchor="middle" dominant-baseline="central" fill="#854F0B">field-by-field rules</text>

<line x1="85" y1="70" x2="85" y2="740" class="lifeline"/>
<line x1="245" y1="70" x2="245" y2="740" class="lifeline"/>
<line x1="425" y1="70" x2="425" y2="740" class="lifeline"/>
<line x1="600" y1="70" x2="600" y2="740" class="lifeline"/>

<text class="ts" x="40" y="100" fill="#5F5E5A">T+0:00</text>
<rect x="80" y="105" width="10" height="60" class="activation"/>
<line x1="90" y1="120" x2="425" y2="120" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="257" y="113" text-anchor="middle" fill="#2C2C2A">updatePoint slot[2]:</text>
<text class="ts" x="257" y="138" text-anchor="middle" fill="#2C2C2A">{x:0.45, y:0.30}, deathStage:'break'</text>
<text class="ts" x="257" y="155" text-anchor="middle" fill="#854F0B">_meta:{source:'scout', ts:T0}</text>

<text class="ts" x="40" y="195" fill="#5F5E5A">T+5min</text>
<rect x="240" y="200" width="10" height="40" class="activation"/>
<line x1="250" y1="215" x2="425" y2="215" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="337" y="208" text-anchor="middle" fill="#2C2C2A">createSelfReport:</text>
<text class="ts" x="337" y="232" text-anchor="middle" fill="#2C2C2A">breakout:'Dog' (→0.42, 0.28),</text>
<text class="ts" x="337" y="252" text-anchor="middle" fill="#2C2C2A">outcome:'inplay', reason:'nie_wiem'</text>

<line x1="40" y1="280" x2="660" y2="280" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="340" y="298" text-anchor="middle" fill="#5F5E5A">CONFLICT: same slot, different values for position, deathStage, reason</text>

<text class="ts" x="40" y="325" fill="#5F5E5A">T+30:00</text>
<rect x="80" y="330" width="10" height="20" class="activation"/>
<line x1="90" y1="338" x2="600" y2="338" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="345" y="331" text-anchor="middle" fill="#2C2C2A">end matchup → trigger propagator</text>

<rect x="595" y="355" width="10" height="270" class="activation"/>

<rect x="40" y="370" width="600" height="220" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="60" y="392" dominant-baseline="central" fill="#633806">Per-field resolution rules execute on slot[2]</text>

<text class="ts" x="60" y="418" dominant-baseline="central" fill="#633806">position field:</text>
<text class="ts" x="220" y="418" dominant-baseline="central" fill="#854F0B">scout &gt; self-log</text>
<text class="ts" x="370" y="418" dominant-baseline="central" fill="#5F5E5A">→ KEEP {0.45, 0.30}</text>
<text class="ts" x="540" y="418" dominant-baseline="central" fill="#854F0B">_meta.source: 'scout'</text>

<text class="ts" x="60" y="442" dominant-baseline="central" fill="#633806">deathStage:</text>
<text class="ts" x="220" y="442" dominant-baseline="central" fill="#854F0B">self-log &gt; coach</text>
<text class="ts" x="370" y="442" dominant-baseline="central" fill="#5F5E5A">→ OVERRIDE 'inplay'</text>
<text class="ts" x="540" y="442" dominant-baseline="central" fill="#854F0B">_meta.source: 'self'</text>

<text class="ts" x="60" y="466" dominant-baseline="central" fill="#633806">deathReason:</text>
<text class="ts" x="220" y="466" dominant-baseline="central" fill="#854F0B">coach &gt; self-log</text>
<text class="ts" x="370" y="466" dominant-baseline="central" fill="#5F5E5A">→ KEEP scout's value</text>
<text class="ts" x="540" y="466" dominant-baseline="central" fill="#854F0B">_meta.source: 'scout'</text>

<text class="ts" x="60" y="490" dominant-baseline="central" fill="#633806">comments / free text:</text>
<text class="ts" x="220" y="490" dominant-baseline="central" fill="#854F0B">latest writer wins</text>
<text class="ts" x="370" y="490" dominant-baseline="central" fill="#5F5E5A">→ player's text</text>
<text class="ts" x="540" y="490" dominant-baseline="central" fill="#854F0B">_meta.ts tie-break</text>

<line x1="60" y1="505" x2="620" y2="505" stroke="#854F0B" stroke-width="0.3" stroke-dasharray="2 2"/>

<text class="ts" x="60" y="525" dominant-baseline="central" fill="#633806">Same source on both sides:</text>
<text class="ts" x="280" y="525" dominant-baseline="central" fill="#854F0B">_meta.ts (latest wins)</text>

<text class="ts" x="60" y="548" dominant-baseline="central" fill="#633806">Position recency override:</text>
<text class="ts" x="280" y="548" dominant-baseline="central" fill="#854F0B">DOES NOT apply</text>
<text class="ts" x="430" y="548" dominant-baseline="central" fill="#5F5E5A">scout fidelity always wins</text>

<text class="ts" x="60" y="571" dominant-baseline="central" fill="#633806">Player edits selfReport later:</text>
<text class="ts" x="280" y="571" dominant-baseline="central" fill="#854F0B">re-run propagator (idempotent)</text>

<line x1="600" y1="615" x2="425" y2="615" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="608" text-anchor="middle" fill="#2C2C2A">single batched updateDoc</text>
<text class="ts" x="510" y="630" text-anchor="middle" fill="#854F0B">slot[2] with mixed-source meta per field</text>

<line x1="425" y1="660" x2="600" y2="660" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="510" y="653" text-anchor="middle" fill="#5F5E5A">ack</text>

<line x1="40" y1="700" x2="660" y2="700" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="340" y="722" text-anchor="middle" fill="#5F5E5A">Future ScoutedTeamPage UI surfaces "filled by self / coach / mixed" badges per slot</text>
<text class="ts" x="340" y="740" text-anchor="middle" fill="#5F5E5A">Coach can audit who said what · provenance preserved in _meta arrays</text>
</svg>
