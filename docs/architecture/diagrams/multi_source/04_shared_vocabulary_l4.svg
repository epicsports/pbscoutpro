<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 540" role="img">
<title>PbScoutPro shared vocabulary — bunker positionName flowing to four consumer touch points and bidirectional position transformation pipeline</title>
<desc>Layout bunker source feeds four consumers. Forward path uses fieldSide offset to convert bunker centroid to player position for write. Reverse path uses nearest bunker matching to derive positionName for read.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="120" y="30" width="440" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="54" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Layout bunker (source of truth)</text>
<text class="ts" x="340" y="76" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">{ id, positionName: 'Dog', x: 0.42, y: 0.28, type: 'MD' }</text>
<text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">side derived from y vs discoLine / zeekerLine</text>

<line x1="200" y1="110" x2="120" y2="160" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="110" x2="270" y2="160" class="arr" marker-end="url(#arrow)"/>
<line x1="390" y1="110" x2="410" y2="160" class="arr" marker-end="url(#arrow)"/>
<line x1="480" y1="110" x2="560" y2="160" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="160" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="120" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">PPT picker</text>
<text class="ts" x="120" y="200" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Player selects "Dog"</text>

<rect x="210" y="160" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="290" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">KIOSK lobby</text>
<text class="ts" x="290" y="200" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Tile label "Dog"</text>

<rect x="380" y="160" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="460" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Scout canvas</text>
<text class="ts" x="460" y="200" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Drawn pill label</text>

<rect x="480" y="160" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="560" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Insights</text>
<text class="ts" x="560" y="200" text-anchor="middle" dominant-baseline="central" fill="#3C3489">String match group-by</text>

<line x1="40" y1="260" x2="640" y2="260" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="340" y="278" text-anchor="middle" fill="#5F5E5A">NEW for § 57: bidirectional bunker ↔ position pipeline</text>

<rect x="40" y="300" width="600" height="100" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="60" y="324" dominant-baseline="central" fill="#633806">Forward: bunker → player position (write path)</text>
<rect x="60" y="340" width="160" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="140" y="362" text-anchor="middle" dominant-baseline="central" fill="#633806">bunker.x, bunker.y</text>
<rect x="260" y="340" width="180" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="350" y="356" text-anchor="middle" dominant-baseline="central" fill="#633806">bunkerToPosition()</text>
<text class="ts" x="350" y="372" text-anchor="middle" dominant-baseline="central" fill="#854F0B">+ fieldSide offset ±0.02</text>
<rect x="480" y="340" width="140" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="550" y="362" text-anchor="middle" dominant-baseline="central" fill="#633806">player {x, y}</text>
<line x1="220" y1="362" x2="260" y2="362" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="362" x2="480" y2="362" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="420" width="600" height="100" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="60" y="444" dominant-baseline="central" fill="#3C3489">Reverse: player position → bunker (read path, existing)</text>
<rect x="60" y="460" width="140" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="130" y="482" text-anchor="middle" dominant-baseline="central" fill="#3C3489">player {x, y}</text>
<rect x="240" y="460" width="200" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central" fill="#3C3489">findNearestBunker()</text>
<text class="ts" x="340" y="492" text-anchor="middle" dominant-baseline="central" fill="#534AB7">threshold 0.15 distance</text>
<rect x="480" y="460" width="140" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="550" y="482" text-anchor="middle" dominant-baseline="central" fill="#3C3489">positionName</text>
<line x1="200" y1="482" x2="240" y2="482" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="482" x2="480" y2="482" class="arr" marker-end="url(#arrow)"/>
</svg>
