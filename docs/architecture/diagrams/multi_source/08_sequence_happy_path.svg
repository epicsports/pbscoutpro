<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 820" role="img">
<title>Sequence diagram — happy path from coach assignment through end-of-matchup batch propagation</title>
<desc>Coach assigns players, player logs mid-point creating orphan selfReport, coach saves and ends matchup which fires batch propagator. Propagator queries orphans, matches each to point slot, writes back to homeData with provenance metadata.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
  .lifeline { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .activation { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .msg { stroke: #2C2C2A; stroke-width: 1; fill: none; }
  .return { stroke: #888780; stroke-width: 1; stroke-dasharray: 3 3; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="thinarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1" stroke-linecap="round"/>
  </marker>
</defs>

<rect x="20" y="20" width="130" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="85" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Coach</text>
<text class="ts" x="85" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">tablet · MatchPage</text>

<rect x="180" y="20" width="130" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="245" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player</text>
<text class="ts" x="245" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">phone · PPT wizard</text>

<rect x="340" y="20" width="170" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="425" y="40" text-anchor="middle" dominant-baseline="central" fill="#712B13">Firestore</text>
<text class="ts" x="425" y="58" text-anchor="middle" dominant-baseline="central" fill="#712B13">points · selfReports</text>

<rect x="540" y="20" width="120" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="600" y="40" text-anchor="middle" dominant-baseline="central" fill="#633806">Propagator</text>
<text class="ts" x="600" y="58" text-anchor="middle" dominant-baseline="central" fill="#854F0B">coach device</text>

<line x1="85" y1="70" x2="85" y2="800" class="lifeline"/>
<line x1="245" y1="70" x2="245" y2="800" class="lifeline"/>
<line x1="425" y1="70" x2="425" y2="800" class="lifeline"/>
<line x1="600" y1="70" x2="600" y2="800" class="lifeline"/>

<text class="ts" x="40" y="100" fill="#5F5E5A">T+0:00</text>
<rect x="80" y="105" width="10" height="60" class="activation"/>
<line x1="90" y1="115" x2="425" y2="115" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="108" fill="#2C2C2A">createPoint(slotIds=[5×uuid], status='open')</text>
<line x1="90" y1="145" x2="425" y2="145" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="138" fill="#2C2C2A">updatePoint(assignments, status='partial')</text>

<line x1="40" y1="180" x2="660" y2="180" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="340" y="195" text-anchor="middle" fill="#5F5E5A">Point in progress · player p3 eliminated mid-point, walks to pit</text>

<text class="ts" x="40" y="225" fill="#5F5E5A">T+0:30</text>
<rect x="240" y="230" width="10" height="80" class="activation"/>
<text class="ts" x="180" y="248" text-anchor="end" fill="#2C2C2A">opens PPT</text>
<line x1="250" y1="270" x2="425" y2="270" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="260" y="263" fill="#2C2C2A">createSelfReport({breakout:'Dog',</text>
<text class="ts" x="260" y="278" fill="#2C2C2A">shots:[...], outcome, slotRef:null})</text>
<line x1="425" y1="300" x2="250" y2="300" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="335" y="294" text-anchor="middle" fill="#5F5E5A">selfReportId</text>

<line x1="40" y1="330" x2="660" y2="330" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>

<text class="ts" x="40" y="355" fill="#5F5E5A">T+2:00</text>
<rect x="80" y="360" width="10" height="40" class="activation"/>
<line x1="90" y1="372" x2="425" y2="372" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="365" fill="#2C2C2A">savePoint(outcome='win_a', status='scouted')</text>

<text class="ts" x="40" y="420" text-anchor="start" fill="#5F5E5A">…</text>
<text class="ts" x="340" y="420" text-anchor="middle" fill="#5F5E5A">repeat for points 2-7 (assignments + saves + occasional self-logs)</text>

<line x1="40" y1="445" x2="660" y2="445" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>

<text class="ts" x="40" y="470" fill="#5F5E5A">T+30:00</text>
<rect x="80" y="475" width="10" height="60" class="activation"/>
<line x1="90" y1="485" x2="425" y2="485" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="478" fill="#2C2C2A">endMatchup() · matchup.status: playing → closed</text>
<line x1="425" y1="515" x2="600" y2="515" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="508" text-anchor="middle" fill="#5F5E5A">onSnapshot fires</text>

<rect x="595" y="525" width="10" height="200" class="activation"/>
<text class="ts" x="615" y="540" fill="#633806">orphan query</text>
<line x1="600" y1="555" x2="425" y2="555" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="548" text-anchor="middle" fill="#2C2C2A">queryByMatchupId</text>
<line x1="425" y1="580" x2="600" y2="580" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="510" y="573" text-anchor="middle" fill="#5F5E5A">list[selfReport]</text>

<text class="ts" x="615" y="605" fill="#633806">match each to slotId</text>
<text class="ts" x="615" y="623" fill="#854F0B">via assignments + ts</text>

<line x1="600" y1="650" x2="425" y2="650" class="msg" marker-end="url(#arrow)"/>
<text class="ts" x="510" y="643" text-anchor="middle" fill="#2C2C2A">batched updateDoc per point</text>
<text class="ts" x="510" y="666" text-anchor="middle" fill="#854F0B">all 5 slots + meta in one write</text>
<line x1="425" y1="690" x2="600" y2="690" class="return" marker-end="url(#thinarrow)"/>
<text class="ts" x="510" y="683" text-anchor="middle" fill="#5F5E5A">ack</text>

<line x1="40" y1="740" x2="660" y2="740" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="340" y="760" text-anchor="middle" fill="#5F5E5A">All readers (heatmap, insights, coachingStats) see updated homeData on next read</text>
<text class="ts" x="340" y="780" text-anchor="middle" fill="#5F5E5A">28 reader functions unchanged · _meta arrays ignored by legacy code</text>
</svg>
