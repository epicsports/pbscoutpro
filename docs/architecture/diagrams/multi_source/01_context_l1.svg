<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 380" role="img">
<title>PbScoutPro context diagram — four actor types, system, and Firebase backend</title>
<desc>Coach, player, scout/viewer, and admin interact with PbScoutPro. System persists data through Firebase Firestore and Auth on the free tier.</desc>
<style>
  .box { fill: #f8f8f6; stroke: #5F5E5A; stroke-width: 0.5; }
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; fill: #2C2C2A; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; fill: #5F5E5A; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; fill: #2C2C2A; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .t, .c-gray .ts, .c-gray .th { fill: #2C2C2A; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .t, .c-purple .ts, .c-purple .th { fill: #3C3489; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .t, .c-coral .ts, .c-coral .th { fill: #712B13; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<g class="c-gray"><rect x="15" y="40" width="140" height="64" rx="8" stroke-width="0.5"/></g>
<text class="th" x="85" y="64" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Coach</text>
<text class="ts" x="85" y="86" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Assigns + scouts + reviews</text>

<g class="c-gray"><rect x="185" y="40" width="140" height="64" rx="8" stroke-width="0.5"/></g>
<text class="th" x="255" y="64" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Player</text>
<text class="ts" x="255" y="86" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Self-logs own actions</text>

<g class="c-gray"><rect x="355" y="40" width="140" height="64" rx="8" stroke-width="0.5"/></g>
<text class="th" x="425" y="64" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Scout / Viewer</text>
<text class="ts" x="425" y="86" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Records or read-only</text>

<g class="c-gray"><rect x="525" y="40" width="140" height="64" rx="8" stroke-width="0.5"/></g>
<text class="th" x="595" y="64" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Admin</text>
<text class="ts" x="595" y="86" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Manages workspace + roles</text>

<line x1="85" y1="104" x2="200" y2="170" class="arr" marker-end="url(#arrow)"/>
<line x1="255" y1="104" x2="300" y2="170" class="arr" marker-end="url(#arrow)"/>
<line x1="425" y1="104" x2="400" y2="170" class="arr" marker-end="url(#arrow)"/>
<line x1="595" y1="104" x2="500" y2="170" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple"><rect x="100" y="170" width="480" height="100" rx="12" stroke-width="0.5"/></g>
<text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central" fill="#3C3489">PbScoutPro</text>
<text class="ts" x="340" y="222" text-anchor="middle" dominant-baseline="central" fill="#3C3489">5-level scout + self-log app</text>
<text class="ts" x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Multi-role per user · admin can impersonate via View Switcher</text>

<line x1="340" y1="270" x2="340" y2="300" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral"><rect x="200" y="300" width="280" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="324" text-anchor="middle" dominant-baseline="central" fill="#712B13">Firebase (Spark / free tier)</text>
<text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central" fill="#712B13">Firestore + Auth + collection group indexes</text>
</svg>
