<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img">
<title>Per-coach streams and canonical merge interaction with batch propagator</title>
<desc>Coach A and B write to separate source streams during match. After endMatchAndMerge, system creates canonical merged document. Propagator must prefer canonical when present, never write to source streams post-merge.</desc>
<style>
  .t { font: 14px -apple-system, "Segoe UI", sans-serif; }
  .ts { font: 12px -apple-system, "Segoe UI", sans-serif; }
  .th { font: 500 14px -apple-system, "Segoe UI", sans-serif; }
  .arr { stroke: #888780; stroke-width: 1; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">During match · per-coach streams</text>

<rect x="40" y="50" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="110" y="68" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Coach A tablet</text>
<text class="ts" x="110" y="86" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">savePoint stream A</text>

<rect x="500" y="50" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="570" y="68" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Coach B tablet</text>
<text class="ts" x="570" y="86" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">savePoint stream B</text>

<line x1="110" y1="100" x2="190" y2="140" class="arr" marker-end="url(#arrow)"/>
<line x1="570" y1="100" x2="490" y2="140" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="140" width="260" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="190" y="160" text-anchor="middle" dominant-baseline="central" fill="#3C3489">matchKey_coachAshort_001</text>
<text class="ts" x="190" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">homeData written by A</text>
<text class="ts" x="190" y="196" text-anchor="middle" dominant-baseline="central" fill="#3C3489">canonical: false</text>

<rect x="360" y="140" width="260" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="490" y="160" text-anchor="middle" dominant-baseline="central" fill="#3C3489">matchKey_coachBshort_001</text>
<text class="ts" x="490" y="180" text-anchor="middle" dominant-baseline="central" fill="#3C3489">awayData written by B</text>
<text class="ts" x="490" y="196" text-anchor="middle" dominant-baseline="central" fill="#3C3489">canonical: false</text>

<line x1="40" y1="240" x2="640" y2="240" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="340" y="258" text-anchor="middle" fill="#5F5E5A">endMatchAndMerge fires (§ 42)</text>

<line x1="190" y1="270" x2="290" y2="320" class="arr" marker-end="url(#arrow)"/>
<line x1="490" y1="270" x2="390" y2="320" class="arr" marker-end="url(#arrow)"/>

<rect x="180" y="320" width="320" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="340" y="344" text-anchor="middle" dominant-baseline="central" fill="#633806">matchKey_merged_001 (canonical)</text>
<text class="ts" x="340" y="366" text-anchor="middle" dominant-baseline="central" fill="#854F0B">homeData + awayData reconciled</text>
<text class="ts" x="340" y="384" text-anchor="middle" dominant-baseline="central" fill="#854F0B">canonical: true · sources flagged mergedInto</text>

<line x1="40" y1="430" x2="640" y2="430" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3 3"/>

<rect x="40" y="450" width="290" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="60" y="472" dominant-baseline="central" fill="#633806">Propagator MUST prefer:</text>
<text class="ts" x="60" y="494" dominant-baseline="central" fill="#854F0B">1. canonical === true (post-merge)</text>
<text class="ts" x="60" y="514" dominant-baseline="central" fill="#854F0B">2. else: !canonical && !mergedInto</text>
<text class="ts" x="60" y="534" dominant-baseline="central" fill="#854F0B">(active stream, pre-merge)</text>

<rect x="350" y="450" width="290" height="100" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="370" y="472" dominant-baseline="central" fill="#791F1F">NEVER write to:</text>
<text class="ts" x="370" y="494" dominant-baseline="central" fill="#A32D2D">Source streams flagged mergedInto</text>
<text class="ts" x="370" y="514" dominant-baseline="central" fill="#A32D2D">— breaks audit chain</text>
<text class="ts" x="370" y="534" dominant-baseline="central" fill="#A32D2D">— canonical doc becomes stale</text>
</svg>
